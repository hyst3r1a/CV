services:
  # --- Spring Boot backend ---
  - type: web
    name: orbital-cv-backend
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -jar target/orbitcv-1.0.0.jar
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: FRONTEND_ORIGIN
        fromService:
          name: orbital-cv-frontend
          type: web
          property: host
          format: https://{}

  # --- React + Vite frontend ---
  - type: web
    name: orbital-cv-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: orbital-cv-backend
          type: web
          property: host
          format: https://{}
