services:
  # --- Spring Boot backend (Docker) ---
  - type: web
    name: orbital-cv-backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: FRONTEND_ORIGIN
        fromService:
          name: orbital-cv-frontend
          type: static
          property: host
          format: https://{}

  # --- React + Vite frontend (Static Site) ---
  - type: static
    name: orbital-cv-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: orbital-cv-backend
          type: web
          property: host
          format: https://{}
