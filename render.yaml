services:
  # --- Spring Boot backend (Docker) ---
  - type: web
    name: orbital-cv-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # For now, set this explicitly after frontend exists,
      # or allow a known onrender.com/custom domain in Spring CORS.
      - key: FRONTEND_ORIGIN
        value: https://orbital-cv-frontend.onrender.com

  # --- React + Vite frontend (Static Site) ---
  - type: web
    name: orbital-cv-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_BASE_URL
        value: https://orbital-cv-backend.onrender.com